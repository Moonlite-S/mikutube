services:
  navidrome:
    image: deluan/navidrome:latest
    user: "1000:1000"
    ports:
      - "4533:4533"
    restart: unless-stopped
    volumes:
      - "/home/sean/Documents/Navidrome:/data"
      - "/mnt/storage/media/music:/music:ro"

  yt_playlist_downloader:
    build: ./downloader
    user: "1000:1000"
    restart: unless-stopped
    environment:
      - SYNC_INTERVAL=3600   # seconds between sync runs (1 hour)
    volumes:
      - "/mnt/storage/media/music:/music"
      # Optional: mount a cookies file if you ever add private playlists
      # - "/home/sean/stack/cookies.txt:/cookies.txt:ro"
