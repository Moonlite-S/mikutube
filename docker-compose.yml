services:
  navidrome:
    image: deluan/navidrome:latest
    user: "1000:1000"
    ports:
      - "4533:4533"
    restart: unless-stopped
    volumes:
      - "/home/sean/Documents/Navidrome:/data"
      - "/mnt/storage/media/music:/music:ro"

  yt_playlist_downloader:
    build: ./downloader
    user: "1000:1000"
    restart: on-failure
    environment:
      - SYNC_INTERVAL=3600   # seconds between sync runs (1 hour)
    volumes:
      - "/mnt/storage/media/music:/music"
      # Optional: mount a cookies file if you ever add private playlists
      # - "/home/sean/stack/cookies.txt:/cookies.txt:ro"

  ytdl-sub:
      image: ghcr.io/jmbannon/ytdl-sub-gui:latest
      container_name: ytdl-sub
      restart: unless-stopped
      environment:
        - TZ=America/Chicago
        - PUID=1000
        - PGID=1000
      volumes:
        - /mnt/storage/media/music:/music  
      ports:
        - 8443:8443
